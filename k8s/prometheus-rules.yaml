# prometheus-rules.yaml
# Alerting rules for the SRE MCP server.
# Load with: prometheus --config.file=... and point rule_files at this path.
# Or add to your existing Prometheus rules ConfigMap in Kubernetes.

groups:
  - name: sre-mcp-server
    interval: 60s
    rules:

      # ── Tool error rate ──────────────────────────────────────────────────────

      - alert: MCPToolHighErrorRate
        expr: |
          (
            sum by (mcp_tool_name) (rate(mcp_tool_errors_total[5m]))
            /
            sum by (mcp_tool_name) (rate(mcp_tool_invocations_total[5m]))
          ) > 0.10
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "MCP tool {{ $labels.mcp_tool_name }} error rate > 10%"
          description: |
            Tool {{ $labels.mcp_tool_name }} has a {{ $value | humanizePercentage }} error rate
            over the last 5 minutes. Check OTel traces in Tempo for root cause.
          runbook_url: "https://wiki.example.com/runbooks/sre-agent/tool-errors"

      - alert: MCPToolCriticalErrorRate
        expr: |
          (
            sum by (mcp_tool_name) (rate(mcp_tool_errors_total[5m]))
            /
            sum by (mcp_tool_name) (rate(mcp_tool_invocations_total[5m]))
          ) > 0.50
        for: 2m
        labels:
          severity: critical
          team: sre
        annotations:
          summary: "MCP tool {{ $labels.mcp_tool_name }} error rate > 50%"
          description: |
            Tool {{ $labels.mcp_tool_name }} is failing more than 50% of calls.
            The SRE agent may be unable to investigate incidents effectively.

      # ── Tool latency ─────────────────────────────────────────────────────────

      - alert: MCPToolHighLatency
        expr: |
          histogram_quantile(0.95,
            sum by (mcp_tool_name, le) (rate(mcp_tool_duration_seconds_bucket[5m]))
          ) > 10
        for: 5m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "MCP tool {{ $labels.mcp_tool_name }} p95 latency > 10s"
          description: |
            The p95 latency for {{ $labels.mcp_tool_name }} is {{ $value | humanizeDuration }}.
            This may indicate the upstream data source (Thanos/Loki/Tempo) is slow.

      # ── Upstream connectivity ─────────────────────────────────────────────────
      # If a tool that should be called regularly goes silent, something is wrong.

      - alert: MCPToolNoInvocations
        expr: |
          sum by (mcp_tool_name) (rate(mcp_tool_invocations_total[30m])) == 0
        for: 30m
        labels:
          severity: info
          team: sre
        annotations:
          summary: "MCP tool {{ $labels.mcp_tool_name }} has had no invocations in 30m"
          description: |
            This may be expected outside business hours, but could also indicate
            the agent is not running or the tool registration failed.

      # ── In-flight call buildup ────────────────────────────────────────────────

      - alert: MCPToolCallsStuck
        expr: |
          sum by (mcp_tool_name) (mcp_active_tool_calls) > 5
        for: 2m
        labels:
          severity: warning
          team: sre
        annotations:
          summary: "MCP tool {{ $labels.mcp_tool_name }} has >5 stuck in-flight calls"
          description: |
            More than 5 concurrent calls to {{ $labels.mcp_tool_name }} have been
            in-flight for 2+ minutes. Possible upstream timeout or deadlock.
